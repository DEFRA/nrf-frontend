name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci --ignore-scripts
          npm run security-audit
          npm run build:frontend
          npm run format:check
          npm run lint
          npm test

      - name: Set git hash
        run: echo "${{ github.sha }}" > .git-hash

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag cdp-node-frontend-template .
          exit $?

      - name: Verify git hash in Docker image
        run: docker run --rm cdp-node-frontend-template cat .git-hash

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v8 #  (or check latest version on https://github.com/marketplace/actions/official-sonarqube-scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  journey-tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    env:
      MAILINATOR_API_KEY: ${{ secrets.MAILINATOR_API_KEY }}
      NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t defradigital/nrf-frontend:${{ github.sha }} .
      - uses: DEFRA/nrf-journey-tests/run-journey-tests@main
        with:
          nrf-frontend: ${{ github.sha }}
